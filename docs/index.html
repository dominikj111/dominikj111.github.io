en microkernel architecture for offline-first, hot-swappable, language-agnostic applications. Components access capabilities through trait/interface contracts via a singleton registry — no direct coupling. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://crates.io/crates/singleton-registry" rel="noopener noreferrer">singleton-registry</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> A thread-safe singleton registry crate for Rust. Create isolated registries for any type — the foundational primitive behind the JigsawFlow architecture. Published on crates.io. </li><li style="margin-bottom:1.5rem"> <strong> UI Components Library (private) </strong>   <em style="font-size:0.85em">(Project)</em> <br> A theming-first React component library built on Radix UI primitives and CSS custom properties — the design system powering this site. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://github.com/dominikj111/iced-shell" rel="noopener noreferrer">Iced Application Shell</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> A comprehensive application shell built with the iced GUI framework — modals, overlays, context menus, toast notifications, theming, and keyboard shortcuts. Reference implementation and reusable foundation for iced apps. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://github.com/dominikj111/chart-sense" rel="noopener noreferrer">Chart Sense</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> Reverse-engineer chart properties from PNG images using machine learning. Chart type classifier achieves 100% accuracy on controlled evaluation data. Designed for automated visual testing of chart rendering engines. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://github.com/dominikj111/graphql-tinylab" rel="noopener noreferrer">GraphQL Tiny Lab</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> &quot;Learn GraphQL by shaping live data in a playful visual lab.&quot; A browser SPA with a Visual Query Builder, live GraphQL request payload panel, and result payload viewer backed by mocked generated data. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://github.com/dominikj111/LLM" rel="noopener noreferrer">LLM Sandbox</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> Personal LLM playground — Dockerised solutions for diffusion models, Jupyter Notebooks, and Llamafile. Run local AI models with zero host pollution. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://github.com/dominikj111/wave-docker-starter" rel="noopener noreferrer">Wave SaaS Docker Starter</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> Production-ready Docker development environment for the Wave SaaS platform. Wave core stays pristine inside containers; all customisation via bind-mounted plugin and theme directories. One-command setup. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://www.npmjs.com/package/simple-comparator" rel="noopener noreferrer">simple-comparator</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> Lightweight JavaScript object comparison utility. Published on npm under BSD-3-Clause. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://www.npmjs.com/package/prutill" rel="noopener noreferrer">prutill</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> Utility library for common JavaScript/TypeScript programming tasks. Published on npm under Apache-2.0. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://www.npmjs.com/package/call-to-promise" rel="noopener noreferrer">call-to-promise</a> </strong>   <em style="font-size:0.85em">(Project)</em> <br> Converts callback-based functions to Promise-based functions. Published on npm under BSD-3-Clause. </li><li style="margin-bottom:1.5rem"> <strong> <a href="/blog/markdown-style-guide">Markdown Style Guide</a> </strong>   <em style="font-size:0.85em">(Article)</em> <br> A reference for Markdown formatting conventions used in this site — headings, code blocks, callouts, and more. </li><li style="margin-bottom:1.5rem"> <strong> <a href="https://www.youtube.com/watch?v=SSuCyZlksrI" rel="noopener noreferrer">Morning Coffee — The Good Life No.18</a> </strong>   <em style="font-size:0.85em">(Reference)</em> <br> Calm, uplifting chillout house lounge mix — good background music for a focused morning. </li> </ul> </main> </noscript> <!-- Interactive SPA — client:only skips SSR so state initializes cleanly in the browser --> <style>astro-island,astro-slot,astro-static-slot{display:contents}</style><script>(()=>{var e=async t=>{await(await t())()};(self.Astro||(self.Astro={})).only=e;window.dispatchEvent(new Event("astro:only"));})();</script><script>(()=>{var A=Object.defineProperty;var g=(i,o,a)=>o in i?A(i,o,{enumerable:!0,configurable:!0,writable:!0,value:a}):i[o]=a;var d=(i,o,a)=>g(i,typeof o!="symbol"?o+"":o,a);{let i={0:t=>m(t),1:t=>a(t),2:t=>new RegExp(t),3:t=>new Date(t),4:t=>new Map(a(t)),5:t=>new Set(a(t)),6:t=>BigInt(t),7:t=>new URL(t),8:t=>new Uint8Array(t),9:t=>new Uint16Array(t),10:t=>new Uint32Array(t),11:t=>1/0*t},o=t=>{let[l,e]=t;return l in i?i[l](e):void 0},a=t=>t.map(o),m=t=>typeof t!="object"||t===null?t:Object.fromEntries(Object.entries(t).map(([l,e])=>[l,o(e)]));class y extends HTMLElement{constructor(){super(...arguments);d(this,"Component");d(this,"hydrator");d(this,"hydrate",async()=>{var b;if(!this.hydrator||!this.isConnected)return;let e=(b=this.parentElement)==null?void 0:b.closest("astro-island[ssr]");if(e){e.addEventListener("astro:hydrate",this.hydrate,{once:!0});return}let c=this.querySelectorAll("astro-slot"),n={},h=this.querySelectorAll("template[data-astro-template]");for(let r of h){let s=r.closest(this.tagName);s!=null&&s.isSameNode(this)&&(n[r.getAttribute("data-astro-template")||"default"]=r.innerHTML,r.remove())}for(let r of c){let s=r.closest(this.tagName);s!=null&&s.isSameNode(this)&&(n[r.getA
